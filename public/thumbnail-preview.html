<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=240, height=240" />
<title>AI Finance Ops — PH Thumbnail</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 240px; height: 240px; overflow: hidden; }
.thumbnail {
  width: 240px; height: 240px;
  background: #01696f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Poppins', sans-serif;
  position: relative;
}
.logo {
  width: 40px; height: 40px;
  background: #0d2228;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.logo svg { width: 24px; height: 24px; }
.logo-bar { fill: #01a8a0; }
.logo-dot { fill: #f59a0b; }
.name {
  font-size: 13px; font-weight: 700; color: #ffffff;
  letter-spacing: 0.3px; margin-bottom: 6px;
}
.tagline {
  font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.75);
  text-align: center; line-height: 1.3;
  max-width: 190px;
}
.chart-line {
  position: absolute; bottom: 36px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 3px;
}
.bar {
  width: 6px; border-radius: 2px 2px 0 0;
  background: rgba(255,255,255,0.2);
}
.bar:nth-child(1) { height: 18px; }
.bar:nth-child(2) { height: 28px; background: rgba(255,255,255,0.4); }
.bar:nth-child(3) { height: 14px; }
.bar:nth-child(4) { height: 22px; background: rgba(255,255,255,0.35); }
.bar:nth-child(5) { height: 32px; background: #f59a0b; }
.bar:nth-child(6) { height: 20px; }
.bar:nth-child(7) { height: 26px; background: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="thumbnail">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <rect x="3" y="12" width="4" height="9" rx="1" class="logo-bar"/>
      <rect x="10" y="6" width="4" height="15" rx="1" class="logo-bar"/>
      <rect x="17" y="9" width="4" height="12" rx="1" class="logo-bar"/>
      <circle cx="21" cy="7" r="2" class="logo-dot"/>
    </svg>
  </div>
  <div class="name">AI Finance Ops</div>
  <div class="tagline">Real-time SaaS metrics for founders who outgrew spreadsheets</div>
  <div class="chart-line">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>
</div>
</body>
</html>
